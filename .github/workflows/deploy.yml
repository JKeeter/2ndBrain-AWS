name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC for AWS auth (SEC-13: verified credentials)
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  # Gate: CI must pass first
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ─────────────────────────────────────────────
  # Deploy all CDK stacks
  # ─────────────────────────────────────────────
  deploy:
    name: CDK Deploy
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: infrastructure/package-lock.json

      # SEC-13: OIDC auth preferred — no long-lived credentials
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install all dependencies
        run: npm ci

      - name: CDK deploy all stacks
        id: deploy
        working-directory: infrastructure
        run: |
          npx cdk deploy --all --require-approval never \
            --context ownerEmail=${{ secrets.OWNER_EMAIL }} \
            --outputs-file cdk-outputs.json

      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infrastructure/cdk-outputs.json

  # ─────────────────────────────────────────────
  # Smoke test the deployed API
  # ─────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cdk-outputs

      - name: Health check
        run: |
          API_URL=$(jq -r '.["SecondBrain-APIGateway"].ApiUrl // empty' cdk-outputs.json)

          if [ -z "$API_URL" ]; then
            echo "WARNING: No API URL found in CDK outputs. Skipping smoke tests."
            exit 0
          fi

          echo "API URL: $API_URL"

          # Health endpoint should return 200
          echo "=== Health check ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}health")
          echo "Health endpoint returned: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Expected 200, got $HTTP_CODE"
            exit 1
          fi

          # Unauthenticated MCP request should return error (not 5xx)
          echo "=== MCP auth check ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${API_URL}mcp" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"initialize","id":1}')
          echo "MCP endpoint returned: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge "500" ]; then
            echo "ERROR: Server error on MCP endpoint"
            exit 1
          fi

          echo "Smoke tests passed."
